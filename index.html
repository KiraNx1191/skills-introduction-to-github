<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a001a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Background love signs */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Bouncing text container */
    #bouncing-text {
      position: fixed;
      z-index: 10;
      white-space: nowrap;
      font-size: clamp(2rem, 6vw, 5rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow:
        0 0 10px #ff0055,
        0 0 20px #ff0055,
        0 0 40px #ff0055,
        0 0 80px #ff0055;
      background: linear-gradient(90deg, #ff0055, #ff66aa, #ffaacc, #ff66aa, #ff0055);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2s linear infinite;
      user-select: none;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div id="bouncing-text">❤️ I Love You ❤️</div>

  <script>
    /* ── Bouncing text ── */
    const el = document.getElementById('bouncing-text');

    let x = Math.random() * (window.innerWidth  - el.offsetWidth);
    let y = Math.random() * (window.innerHeight - el.offsetHeight);
    let vx = 3 + Math.random() * 2;
    let vy = 3 + Math.random() * 2;

    function bounceText() {
      x += vx;
      y += vy;

      const maxX = window.innerWidth  - el.offsetWidth;
      const maxY = window.innerHeight - el.offsetHeight;

      if (x <= 0)    { x = 0;    vx = Math.abs(vx); }
      if (x >= maxX) { x = maxX; vx = -Math.abs(vx); }
      if (y <= 0)    { y = 0;    vy = Math.abs(vy); }
      if (y >= maxY) { y = maxY; vy = -Math.abs(vy); }

      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      requestAnimationFrame(bounceText);
    }

    // Wait for the element to have a proper size before starting
    window.addEventListener('load', () => {
      x = Math.random() * Math.max(0, window.innerWidth  - el.offsetWidth);
      y = Math.random() * Math.max(0, window.innerHeight - el.offsetHeight);
      bounceText();
    });

    /* ── Unlimited floating love signs on canvas ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const SYMBOLS = ['❤️', '💕', '💖', '💗', '💓', '💞', '💝', '🩷'];
    const COUNT   = 60;
    const signs   = [];

    for (let i = 0; i < COUNT; i++) {
      signs.push(createSign());
    }

    function createSign(fromTop = false) {
      return {
        x:      Math.random() * window.innerWidth,
        y:      fromTop ? -50 : Math.random() * window.innerHeight,
        size:   18 + Math.random() * 42,
        speed:  0.4 + Math.random() * 1.2,
        sway:   Math.random() * 1.5 - 0.75,
        alpha:  0.15 + Math.random() * 0.6,
        symbol: SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
        angle:  Math.random() * Math.PI * 2,
        spin:   (Math.random() - 0.5) * 0.03,
      };
    }

    function drawSigns() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of signs) {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.font        = `${s.size}px serif`;
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'middle';
        ctx.translate(s.x, s.y);
        ctx.rotate(s.angle);
        ctx.fillText(s.symbol, 0, 0);
        ctx.restore();

        // Move upward with slight horizontal sway
        s.y     -= s.speed;
        s.x     += Math.sin(s.y * 0.02) * s.sway;
        s.angle += s.spin;

        // Respawn from bottom when off-screen
        if (s.y < -60) {
          Object.assign(s, createSign(true));
          s.y = canvas.height + 60;
        }
      }

      requestAnimationFrame(drawSigns);
    }

    drawSigns();

    // Keep bounce speed consistent after resize
    window.addEventListener('resize', () => {
      x = Math.min(x, window.innerWidth  - el.offsetWidth);
      y = Math.min(y, window.innerHeight - el.offsetHeight);
    });
  </script>
</body>
</html>
